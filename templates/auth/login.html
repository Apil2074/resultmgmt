<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | {{ app_name }}</title>
  <meta name="description" content="Sign in to {{ app_name }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  {% load static %}
  <style>
    :root {
      --bg-color: #f8fafc; /* Slate 50 */
      --card-bg: rgba(255, 255, 255, 0.85);
      --border-color: rgba(148, 163, 184, 0.15); /* Slate 400 with opacity */
      --text-main: #0f172a; /* Slate 900 */
      --text-muted: #64748b; /* Slate 500 */
      --accent-color: #2563eb; /* Royal Blue */
      --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      --focus-ring: rgba(37, 99, 235, 0.15);
      --radius-md: 12px;
      --color-emerald: #10B981;
      --color-red: #EF4444;
      --color-gold: #F59E0B;
      --color-blue: #3B82F6;
      --color-text: var(--text-main);
      --color-text-dim: var(--text-muted);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    /* Subtle background grid pattern & glow effects */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 50% -20%, rgba(37, 99, 235, 0.08) 0%, transparent 60%),
        radial-gradient(circle at 10% 80%, rgba(59, 130, 246, 0.04) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .background-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(15, 23, 42, 0.015) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(15, 23, 42, 0.015) 1px, transparent 1px);
      background-size: 45px 45px;
      pointer-events: none;
      z-index: 0;
    }

    /* Floating school/academic themed symbols */
    .floating-symbol {
      position: absolute;
      color: rgba(37, 99, 235, 0.06); /* Ultra-faint blue overlay */
      fill: currentColor;
      pointer-events: none;
      z-index: 1;
      user-select: none;
    }

    @keyframes float-slow-1 {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(8deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }
    @keyframes float-slow-2 {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(-12deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }
    @keyframes float-slow-3 {
      0% { transform: translateY(0) rotate(0deg) scale(1); }
      50% { transform: translateY(-15px) rotate(15deg) scale(1.05); }
      100% { transform: translateY(0) rotate(0deg) scale(1); }
    }
    @keyframes drift-slow {
      0% { transform: translateX(0) translateY(0) rotate(0deg); }
      50% { transform: translateX(20px) translateY(-15px) rotate(5deg); }
      100% { transform: translateX(0) translateY(0) rotate(0deg); }
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 3rem 2.5rem;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      z-index: 10;
      box-sizing: border-box;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2.25rem;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(37, 99, 235, 0.06);
      border: 1px solid rgba(37, 99, 235, 0.12);
      border-radius: 30px;
      margin-bottom: 1.25rem;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      background-color: var(--accent-color);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(37, 99, 235, 0.4);
    }

    .logo-text {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent-color);
      text-transform: uppercase;
      font-family: 'Outfit', sans-serif;
    }

    .login-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text-main);
      margin: 0;
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.02em;
    }

    .login-subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 0.5rem;
      margin-bottom: 0;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .form-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0;
    }

    .form-link {
      font-size: 0.8rem;
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .form-link:hover {
      color: #1d4ed8;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .form-control {
      width: 100%;
      padding: 0.85rem 1.1rem;
      font-size: 0.95rem;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 12px;
      color: var(--text-main);
      transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
      font-family: inherit;
      box-sizing: border-box;
    }

    .form-control::placeholder {
      color: #94a3b8;
    }

    .form-control:focus {
      outline: none;
      background: #ffffff;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 4px var(--focus-ring);
    }

    .input-wrapper .form-control.pe-5 {
      padding-right: 3rem;
    }

    .toggle-pwd {
      position: absolute;
      top: 50%;
      right: 0.5rem;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .toggle-pwd:hover {
      color: var(--text-main);
    }

    /* Checkbox */
    .form-check {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }

    .form-check-input {
      appearance: none;
      -webkit-appearance: none;
      width: 17px;
      height: 17px;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      display: inline-grid;
      place-content: center;
      cursor: pointer;
      transition: all 0.2s;
      margin: 0;
    }

    .form-check-input:checked {
      background: var(--accent-color);
      border-color: var(--accent-color);
    }

    .form-check-input:checked::before {
      content: "";
      width: 9px;
      height: 9px;
      background-color: #fff;
      clip-path: polygon(14% 44%, 0 58%, 33% 90%, 100% 23%, 86% 9%, 33% 62%);
      transform: scale(0.9);
    }

    .form-check-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      user-select: none;
      cursor: pointer;
    }

    /* Button */
    .btn-primary {
      width: 100%;
      padding: 0.9rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: #ffffff;
      background: var(--accent-gradient);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
    }

    .btn-primary:active {
      transform: translateY(1px);
    }

    .btn-primary:disabled {
      background: #cbd5e1;
      color: #94a3b8;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Alerts */
    .alert {
      padding: 0.8rem 1.1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
      box-sizing: border-box;
    }

    .alert-danger {
      background: #fef2f2;
      border: 1px solid #fee2e2;
      color: #991b1b;
    }

    .alert-success {
      background: #ecfdf5;
      border: 1px solid #d1fae5;
      color: #065f46;
    }

    .footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.6;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Toast Notifications ─────────────────────────────────────────── */
    #toastContainer {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 380px;
      width: calc(100% - 48px);
      pointer-events: none;
    }

    .rms-toast {
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(226, 232, 240, 0.8);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 16px -6px rgba(0, 0, 0, 0.05);
      color: var(--color-text);
      font-size: 0.88rem;
      font-weight: 500;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease, border-color 0.3s;
      animation: toastSlideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      position: relative;
      overflow: hidden;
      text-align: left;
    }

    .rms-toast::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
    }

    .rms-toast-success::before { background-color: var(--color-emerald); }
    .rms-toast-error::before { background-color: var(--color-red); }
    .rms-toast-danger::before { background-color: var(--color-red); }
    .rms-toast-warning::before { background-color: var(--color-gold); }
    .rms-toast-info::before { background-color: var(--color-blue); }

    .rms-toast-icon {
      font-size: 1.15rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .rms-toast-success .rms-toast-icon { color: var(--color-emerald); }
    .rms-toast-error .rms-toast-icon { color: var(--color-red); }
    .rms-toast-danger .rms-toast-icon { color: var(--color-red); }
    .rms-toast-warning .rms-toast-icon { color: var(--color-gold); }
    .rms-toast-info .rms-toast-icon { color: var(--color-blue); }

    .rms-toast-message {
      flex-grow: 1;
      line-height: 1.4;
      padding-right: 12px;
    }

    .rms-toast-close {
      background: none;
      border: none;
      color: var(--color-text-dim);
      cursor: pointer;
      padding: 0;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
      margin-left: auto;
      flex-shrink: 0;
    }

    .rms-toast-close:hover {
      color: var(--color-text);
    }

    @keyframes toastSlideIn {
      from {
        opacity: 0;
        transform: translateX(120%) translateY(0);
      }
      to {
        opacity: 1;
        transform: translateX(0) translateY(0);
      }
    }

    @keyframes toastSlideOut {
      from {
        opacity: 1;
        transform: translateX(0);
      }
      to {
        opacity: 0;
        transform: translateX(120%);
      }
    }

    .rms-toast-leaving {
      animation: toastSlideOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @media (max-width: 576px) {
      #toastContainer {
        top: 16px;
        right: 16px;
        width: calc(100% - 32px);
      }
    }
  </style>
</head>
<body>

<!-- Floating Home Button -->
<a href="{% url 'landing' %}" style="position: absolute; top: 24px; left: 24px; z-index: 100; display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.85rem; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05); transition: transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 16px rgba(15, 23, 42, 0.08)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(15, 23, 42, 0.05)';">
  <i class="bi bi-house-door-fill" style="color: var(--accent-color);"></i> Home
</a>

<div class="background-grid"></div>

<!-- Floating School-Themed Graphic Assets -->
<!-- Graduation Cap -->
<svg class="floating-symbol" style="top: 10%; left: 8%; width: 75px; height: 75px; animation: float-slow-1 9s ease-in-out infinite;" viewBox="0 0 24 24">
  <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5.47 12.5L12 16l6.53-3.5L12 9 5.47 12.5z"/>
</svg>

<!-- Open Book -->
<svg class="floating-symbol" style="top: 18%; right: 10%; width: 70px; height: 70px; animation: float-slow-2 10s ease-in-out infinite;" viewBox="0 0 24 24">
  <path d="M12 21.6c-1.62-1.35-3.8-2.1-6.5-2.1-2.7 0-4.88.75-6.5 2.1V5c1.62-1.35 3.8-2.1 6.5-2.1 2.7 0 4.88.75 6.5 2.1 1.62-1.35 3.8-2.1 6.5-2.1 2.7 0 4.88.75 6.5 2.1v16.6c-1.62-1.35-3.8-2.1-6.5-2.1-2.7 0-4.88.75-6.5 2.1zM2 18.5c1.78-.6 3.65-.9 5.5-.9 1.85 0 3.72.3 5.5.9V5.5c-1.78-.6-3.65-.9-5.5-.9-1.85 0-3.72.3-5.5.9v13z"/>
</svg>

<!-- Pi Symbol -->
<svg class="floating-symbol" style="bottom: 12%; left: 14%; width: 55px; height: 55px; animation: float-slow-3 8s ease-in-out infinite;" viewBox="0 0 24 24">
  <path d="M4 5v2h2v12h2V7h6v12h2V7h2V5H4z"/>
</svg>

<!-- Sigma Symbol -->
<svg class="floating-symbol" style="bottom: 22%; right: 14%; width: 60px; height: 60px; animation: float-slow-1 11s ease-in-out infinite;" viewBox="0 0 24 24">
  <path d="M18 5H6.83l6.59 6.59L6.83 19H18v2H5v-2l6.5-6.5L5 6V4h13v1z"/>
</svg>

<!-- Graduation Scroll -->
<svg class="floating-symbol" style="top: 8%; right: 40%; width: 55px; height: 55px; animation: float-slow-2 8.5s ease-in-out infinite;" viewBox="0 0 24 24">
  <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2z"/>
</svg>

<!-- Moving variables / Letters -->
<div class="floating-symbol" style="top: 48%; left: 7%; font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 700; animation: drift-slow 12s ease-in-out infinite;">
  A B C
</div>

<div class="floating-symbol" style="top: 52%; right: 7%; font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 700; animation: drift-slow 13s ease-in-out infinite;">
  &radic;<span style="border-top: 2px solid; padding-top: 1px;">x<sup>2</sup></span>
</div>


<div class="login-container">
  <div class="login-logo">
    <a href="/" style="display: block; margin-bottom: 8px;">
      <img src="{% if app_logo_url %}{{ app_logo_url }}{% else %}{% static 'images/school_favicon.png' %}{% endif %}" alt="{{ app_name }} Logo" style="height: 90px; width: auto; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));">
    </a>
    <h2 style="font-size: 1.8rem; font-weight: 800; color: #0f172a; margin: 0 0 12px 0; font-family: 'Outfit', sans-serif; letter-spacing: -0.5px;">{{ app_name }}</h2>

    <h1 class="login-title">Sign In</h1>
    <p class="login-subtitle">Access your school's result portal</p>
  </div>

  {% if messages %}
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      {% for message in messages %}
        showToast("{{ message|escapejs }}", "{% if message.tags == 'error' or message.tags == 'danger' %}error{% elif message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}");
      {% endfor %}
    });
  </script>
  {% endif %}

  <form method="POST" action="{% url 'login' %}" id="loginForm">
    {% csrf_token %}

    <div class="form-group">
      <div class="form-label-row">
        <label class="form-label" for="username">Username or Email</label>
      </div>
      <div class="input-wrapper">
        <input type="text" class="form-control" id="username" name="username" value="{{ username|default:'' }}" placeholder="Enter your username or email" autocomplete="username" required>
      </div>
    </div>

    <div class="form-group">
      <div class="form-label-row">
        <label class="form-label" for="password">Password</label>
        <a href="{% url 'forgot_password' %}" class="form-link">Forgot password?</a>
      </div>
      <div class="input-wrapper">
        <input type="password" class="form-control pe-5" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
        <button type="button" id="togglePwd" class="toggle-pwd" tabindex="-1">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <div class="form-check">
      <input type="checkbox" class="form-check-input" name="remember_me" id="rememberMe">
      <label class="form-check-label" for="rememberMe">Stay logged in</label>
    </div>

    <button type="submit" class="btn-primary" id="loginBtn">
      Sign In
    </button>
  </form>

  <div class="footer">
    Powered by {{ app_name }}
  </div>
</div>

<script>
  document.getElementById('togglePwd')?.addEventListener('click', (e) => {
    e.stopPropagation();
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      pwd.type = 'password';
      icon.className = 'bi bi-eye';
    }
  });

  document.getElementById('loginForm')?.addEventListener('submit', () => {
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span class="spinner"></span>Signing in...';
    btn.disabled = true;
  });
</script>
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>

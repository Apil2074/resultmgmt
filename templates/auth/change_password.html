{% extends 'base.html' %}{% block title %}Change Password{% endblock %}{% block page_title %}Change Password{% endblock %}{% block content %}<div class='card' style='max-width:440px;'><div class='card-header'><div class='card-title'><i class='bi bi-key-fill me-2'></i>Change Password</div></div><form method='POST'>{% csrf_token %}<div class='form-group'><label class='form-label'>Current Password</label><input type='password' name='old_password' class='form-control' required></div><div class='form-group'><label class='form-label'>New Password</label><input type='password' name='new_password' class='form-control' required minlength='8'></div><div class='form-group'><label class='form-label'>Confirm Password</label><input type='password' name='confirm_password' class='form-control' required></div><button class='btn btn-primary w-100'>Change Password</button></form></div>{% endblock %}
